name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Test core and server
        run: mvn -B test -pl jieqi-core,jieqi-server,jieqi-ai

      - name: Compile all modules
        run: mvn -B compile

      - name: Package app (skip tests)
        run: mvn -B package -pl jieqi-app -am -DskipTests
